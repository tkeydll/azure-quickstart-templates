apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: azure-quickstart-templates
  title: Azure Resource Manager QuickStart Templates
  description: >
    Community-contributed Azure Resource Manager (ARM) QuickStart Templates.
    A collection of ARM templates for deploying various Azure resources and solutions.
  annotations:
    github.com/project-slug: Azure/azure-quickstart-templates
    backstage.io/source-location: url:https://github.com/Azure/azure-quickstart-templates
    backstage.io/techdocs-ref: dir:.
  tags:
    - azure
    - arm-templates
    - infrastructure
    - iac
    - microsoft
  links:
    - url: https://azure.microsoft.com/en-us/documentation/templates/
      title: Azure Quickstart Templates Index
      icon: web
    - url: https://github.com/Azure/azure-quickstart-templates/issues
      title: Issue Tracker
      icon: github
spec:
  type: library
  lifecycle: production
  owner: group:azure-quickstart-templates-maintainers
  system: azure-infrastructure

---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: 100-blank-template
  title: "Blank Template"
  description: "ARM template - Blank Template"
  annotations:
    github.com/project-slug: Azure/azure-quickstart-templates
    backstage.io/source-location: url:https://github.com/Azure/azure-quickstart-templates/tree/master/100-blank-template
  tags:
    - azure
    - arm
    - basic
spec:
  owner: group:azure-quickstart-templates-maintainers
  type: infrastructure
  parameters:
    - title: Azure Configuration
      required:
        - resourceGroupName
        - location
      properties:
        resourceGroupName:
          title: Resource Group Name
          type: string
          description: "デプロイ先の Azure リソースグループ名"
        location:
          title: Azure Location
          type: string
          description: "デプロイ先の Azure リージョン"
          default: japaneast
          enum:
            - japaneast
            - japanwest
            - eastus
            - eastus2
            - westus
            - westus2
            - westeurope
            - northeurope
            - southeastasia
            - eastasia
  steps:
    - id: fetch
      name: Fetch ARM Template
      action: fetch:plain
      input:
        url: 'https://github.com/Azure/azure-quickstart-templates/tree/master/100-blank-template'
    - id: deploy
      name: Deploy to Azure
      action: azure:arm:deploy
      input:
        resourceGroupName: ${{ parameters.resourceGroupName }}
        location: ${{ parameters.location }}
        templateFile: azuredeploy.json
        parametersFile: azuredeploy.parameters.json
  output:
    links:
      - title: Azure Portal
        url: https://portal.azure.com/#resource/subscriptions//resourceGroups/${{ parameters.resourceGroupName }}

